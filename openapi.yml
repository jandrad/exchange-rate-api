swagger: "2.0"
info:
    title: Rates API
    description: "Get exchange rates and token information"
    version: "1.0.0"
schemes:
    - "https"
    - "http"
paths:
    "/api/logos/{chain}":
        get:
            description: "Get the token logos form a chain"
            parameters:
                - name: chain
                  in: path
                  required: true
                  type: string
                  example: wax
                - name: token
                  in: query
                  required: false
                  type: string
                  example: WAX@eosio.token
            responses:
                200:
                    description: "Success."
                    schema:
                        type: object
                404:
                    description: "No tokens found"
                500:
                    description: "Internal server error"
    "/api/prices/wax":
        get:
            description: "Get the token and prices in wax"
            responses:
                200:
                    description: "Success."
                    schema:
                        type: object
                404:
                    description: "No tokens found"
                500:
                    description: "Internal server error"
    "/api/fiat/{ticker}":
        get:
            description: "Get the usd price for a fiat symbol"
            parameters:
                - name: ticker
                  in: path
                  required: true
                  type: string
                  example: cop
            responses:
                200:
                    description: "Success."
                    schema:
                        type: string
                404:
                    description: "No rate found"
                500:
                    description: "Internal server error"
    "/api/crypto/{ticker}":
        get:
            description: "Get the usd price for a crypto symbol"
            parameters:
                - name: ticker
                  in: path
                  required: true
                  type: string
                  example: eth
            responses:
                200:
                    description: "Success."
                    schema:
                        type: string
                404:
                    description: "No rate found"
                500:
                    description: "Internal server error"
    "/api/waxonedge/tokens":
        get:
            description: "Get the list of tokens on waxonedge"
            parameters:
                - name: preset
                  in: query
                  required: false
                  type: string
                  example: eosio.token_WAX,token.nefty_NEFTY
                - name: page
                  in: query
                  required: false
                  type: number
                  example: 1
                - name: search
                  in: query
                  required: false
                  type: string
                  example: wax
            responses:
                200:
                    description: "Success."
                    schema:
                        type: object
                500:
                    description: "Internal server error"
    "/api/balances/{chain}":
        get:
            description: "Get the balances of an account"
            parameters:
                - name: chain
                  in: path
                  required: true
                  type: string
                  example: wax
                - name: account
                  in: query
                  required: true
                  type: string
                  example: alpacaworlds
            responses:
                200:
                    description: "Success."
                    schema:
                        type: object
                500:
                    description: "Internal server error"
    "/api/swap/routes":
        get:
            description: "Get routes to swap"
            parameters:
                - name: token_in
                  in: query
                  required: true
                  type: string
                  example: WAX_eosio.token
                - name: token_out
                  in: query
                  required: true
                  type: string
                  example: NEFTY_token.nefty
                - name: amount_in
                  in: query
                  required: true
                  type: string
                  example: "78118.583003"
                - name: slippage
                  in: query
                  required: true
                  type: string
                  example: "500"
                - name: receiver
                  in: query
                  required: true
                  type: string
                  example: "nefty"
                - name: split_max_routes
                  in: query
                  required: false
                  type: number
                  example: 4
                - name: filter_exchange
                  in: query
                  required: false
                  type: string
                - name: filter_type
                  in: query
                  required: false
                  type: string
            responses:
                200:
                    description: "Success."
                    schema:
                        type: object
                500:
                    description: "Internal server error"
